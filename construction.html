<body class="construction-body">

<svg class="grain" xmlns="http://www.w3.org/2000/svg">
  <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter>
  <rect width="100%" height="100%" filter="url(#noise)"/>
</svg>

<div class="glow" aria-hidden="true"></div>

<main class="construction-main">
  <p class="eyebrow">A Calico Project</p>
  <h1>Sunbeam</h1>
  <p class="sub">Ideas that needed somewhere to live, now given a home.</p>

  <div class="badge-wrap">
    <div class="crest-frame">
      <svg class="crest-rays" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="100" cy="100" r="92"/>
        <g>
          <line x1="188" y1="100" x2="198" y2="100"/>
          <line x1="166.6" y1="166.6" x2="173.7" y2="173.7"/>
          <line x1="100" y1="188" x2="100" y2="198"/>
          <line x1="33.4" y1="166.6" x2="26.3" y2="173.7"/>
          <line x1="12" y1="100" x2="2" y2="100"/>
          <line x1="33.4" y1="33.4" x2="26.3" y2="26.3"/>
          <line x1="100" y1="12" x2="100" y2="2"/>
          <line x1="166.6" y1="33.4" x2="173.7" y2="26.3"/>
        </g>
      </svg>
      <img src="/globalmedia/calicocrest.png" alt="Calico crest" class="crest-img">
    </div>
    <p class="badge-caption">[Under Construction]</p>
  </div>

  <p class="quote">"The process is the art."</p>
  <p class="quote-sub">Built With Care in Kent UK</p>
</main>

<div class="vine-wrap" aria-hidden="true">
  <svg width="100%" height="120" viewBox="0 0 1000 120" xmlns="http://www.w3.org/2000/svg">
    <path class="vine-path" d="M0,100 C120,70 220,115 340,90 C460,68 560,110 680,88 C800,68 880,105 1000,80"/>

</div>
