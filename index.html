<meta property="og:title" content="Sunbeam: A Calico Project">
<meta property="og:description" content="Ideas that needed somewhere to live, now given a home.">
<meta property="og:image" content="https://calicosunbeam.org/globalmedia/calicocrest.png">
<meta property="og:url" content="https://calicosunbeam.org/">
<meta property="og:type" content="website">
<meta name="theme-color" content="#FF6600">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,560;1,9..144,460&family=IBM+Plex+Mono:wght@400;500&family=Atkinson+Hyperlegible:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0d0d0d;
    --bg-panel: #141310;
    --orange: #FF6600;
    --orange-dim: #cc5200;
    --cream: #f4ecdd;
    --moss: #6b8f47;
    --muted: #948c80;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    padding:0;
    background: var(--bg);
    color: var(--cream);
    min-height: 100vh;
  }

  body{
    font-family: 'Atkinson Hyperlegible', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow-x:hidden;
    position:relative;
  }

  /* paper grain overlay */
  .grain{
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:0.05;
    mix-blend-mode: overlay;
    z-index:1;
  }

  /* soft sunbeam glow behind content */
  .glow{
    position:fixed;
    top:50%;
    left:50%;
    width:900px;
    height:900px;
    transform:translate(-50%,-50%);
    background: radial-gradient(circle, rgba(255,102,0,0.10) 0%, rgba(255,102,0,0) 65%);
    pointer-events:none;
    z-index:0;
  }

  main{
    position:relative;
    z-index:2;
    max-width: 560px;
    width: 100%;
    padding: 48px 24px 64px;
    text-align:center;
  }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: clamp(11px, 2.4vw, 13px);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--orange);
    margin: 0 0 18px;
  }

  h1{
    font-family:'Fraunces', serif;
    font-optical-sizing:auto;
    font-weight: 560;
    font-size: clamp(40px, 9vw, 68px);
    line-height: 1.02;
    margin: 0 0 16px;
    color: var(--cream);
  }

  .sub{
    font-size: clamp(15px, 2.6vw, 17px);
    line-height: 1.55;
    color: var(--muted);
    max-width: 380px;
    margin: 0 auto 40px;
  }

  .badge-wrap{
    margin: 8px auto 32px;
    width: 220px;
  }

  .crest-frame{
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    animation: stamp 0.7s cubic-bezier(.2,.9,.3,1.2) both;
  }

  .crest-rays{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .crest-img{
    position: absolute;
    top: 50%;
    left: 50%;
    width: 56%;
    height: auto;
    transform: translate(-50%, -50%);
    filter: drop-shadow(0 0 20px rgba(255,102,0,0.28));
  }

  .badge-caption{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 14px 0 0;
  }

  @keyframes stamp{
    0%   { opacity:0; transform: scale(1.4) rotate(-8deg); }
    60%  { opacity:1; }
    100% { opacity:1; transform: scale(1) rotate(0deg); }
  }

  .quote{
    font-family:'Fraunces', serif;
    font-style: italic;
    font-weight: 460;
    font-size: clamp(15px, 2.6vw, 17px);
    color: var(--orange);
    margin: 0 0 8px;
  }

  .quote-sub{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .vine-wrap{
    position: fixed;
    left:0; right:0; bottom:0;
    z-index:1;
    line-height:0;
  }

  .vine-path{
    stroke-dasharray: 1400;
    stroke-dashoffset: 1400;
    animation: grow 2.4s ease-out 0.3s forwards;
  }

  .leaf{
    opacity:0;
    animation: leafIn 0.6s ease-out forwards;
  }

  @keyframes grow{ to { stroke-dashoffset: 0; } }
  @keyframes leafIn{ to { opacity:1; } }

  :focus-visible{
    outline: 2px solid var(--orange);
    outline-offset: 3px;
  }

  @media (prefers-reduced-motion: reduce){
    .badge, .vine-path, .leaf{
      animation: none !important;
      opacity:1 !important;
      stroke-dashoffset:0 !important;
      transform:none !important;
    }
  }
</style>
</head>
<body>

<svg class="grain" xmlns="http://www.w3.org/2000/svg">
  <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter>
  <rect width="100%" height="100%" filter="url(#noise)"/>
</svg>

<div class="glow" aria-hidden="true"></div>

<main>
  <p class="eyebrow">A Calico Project</p>
  <h1>Sunbeam</h1>
  <p class="sub">Ideas that needed somewhere to live, now given a home.</p>

  <div class="badge-wrap">
    <div class="crest-frame">
      <svg class="crest-rays" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="100" cy="100" r="92" fill="none" stroke="#FF6600" stroke-width="1" stroke-dasharray="3 7" opacity="0.35"/>
        <g stroke="#FF6600" stroke-width="1.2" opacity="0.4" stroke-linecap="round">
          <line x1="188" y1="100" x2="198" y2="100"/>
          <line x1="166.6" y1="166.6" x2="173.7" y2="173.7"/>
          <line x1="100" y1="188" x2="100" y2="198"/>
          <line x1="33.4" y1="166.6" x2="26.3" y2="173.7"/>
          <line x1="12" y1="100" x2="2" y2="100"/>
          <line x1="33.4" y1="33.4" x2="26.3" y2="26.3"/>
          <line x1="100" y1="12" x2="100" y2="2"/>
          <line x1="166.6" y1="33.4" x2="173.7" y2="26.3"/>
        </g>
      </svg>
      <img src="/globalmedia/calicocrest.png" alt="Calico crest" class="crest-img">
    </div>
    <p class="badge-caption">[Under Construction]</p>
  </div>

  <p class="quote">"The process is the art."</p>
  <p class="quote-sub">Built With Care in Kent UK</p>
</main>

<div class="vine-wrap" aria-hidden="true">
  <svg width="100%" height="120" viewBox="0 0 1000 120" xmlns="http://www.w3.org/2000/svg">
    <path class="vine-path" d="M0,100 C120,70 220,115 340,90 C460,68 560,110 680,88 C800,68 880,105 1000,80"
          fill="none" stroke="#6b8f47" stroke-width="2" opacity="0.65"/>
    <ellipse class="leaf" style="animation-delay:0.8s"  cx="80"  cy="95"  rx="18" ry="11" transform="rotate(-25 80 95)"   fill="#4a7c59"/>
    <ellipse class="leaf" style="animation-delay:1.0s"  cx="180" cy="82"  rx="20" ry="12" transform="rotate(-20 180 82)"  fill="#4a7c59"/>
    <ellipse class="leaf" style="animation-delay:1.1s"  cx="260" cy="100" rx="18" ry="11" transform="rotate(10 260 100)"  fill="#3d6e4a"/>
    <ellipse class="leaf" style="animation-delay:1.2s"  cx="340" cy="88"  rx="20" ry="12" transform="rotate(-15 340 88)"  fill="#3d6e4a"/>
    <ellipse class="leaf" style="animation-delay:1.3s"  cx="400" cy="76"  rx="18" ry="11" transform="rotate(15 400 76)"   fill="#2d5a3d"/>
    <ellipse class="leaf" style="animation-delay:1.4s"  cx="460" cy="92"  rx="20" ry="12" transform="rotate(-8 460 92)"   fill="#5a8456"/>
    <ellipse class="leaf" style="animation-delay:1.5s"  cx="530" cy="104" rx="18" ry="11" transform="rotate(20 530 104)"  fill="#6e9460"/>
    <ellipse class="leaf" style="animation-delay:1.6s"  cx="620" cy="80"  rx="20" ry="12" transform="rotate(-10 620 80)"  fill="#8fbc6b"/>
    <ellipse class="leaf" style="animation-delay:1.7s"  cx="700" cy="94"  rx="18" ry="11" transform="rotate(18 700 94)"   fill="#a8c97a"/>
    <ellipse class="leaf" style="animation-delay:1.8s"  cx="760" cy="78"  rx="20" ry="12" transform="rotate(-22 760 78)"  fill="#b8b872"/>
    <ellipse class="leaf" style="animation-delay:1.9s"  cx="840" cy="74"  rx="18" ry="11" transform="rotate(25 840 74)"   fill="#c8a96e"/>
    <ellipse class="leaf" style="animation-delay:2.0s"  cx="920" cy="88"  rx="20" ry="12" transform="rotate(-12 920 88)"  fill="#c8a96e"/>
  </svg>
</div>

</body>
</html>
