<!DOCTYPE html>
<html>
<head>
<link rel="icon" type="image/png" href="favicon.png">
  <title>root@calico-sunbeam</title>
  <style>
    body { background: #0d0d0d; color: #33ff33; font-family: monospace; padding: 20px; margin: 0; min-height: 100vh; }
    .bg { position: fixed; inset: 0; background-image: url('https://calicosunbeam.org/calicocrest.png'); background-repeat: no-repeat; background-position: center; background-size: 30%; opacity: 0.04; pointer-events: none; z-index: 0; }
    #terminal { position: relative; z-index: 1; white-space: pre; line-height: 1.6; }
    #cursor { display: inline-block; width: 8px; height: 1em; background: #33ff33; vertical-align: text-bottom; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
<div class="bg"></div>
<div id="terminal"></div>
<span id="cursor"></span>
<script>
  function isBot() {
    const ua = navigator.userAgent.toLowerCase();
    const sigs = ['bot', 'crawler', 'spider', 'headless', 'phantom', 'selenium', 'puppeteer', 'wget', 'curl', 'python'];
    return sigs.some(s => ua.includes(s)) || !navigator.userAgent;
  }

  async function getInfo() {
    try {
      const res = await fetch("https://ipapi.co/json/");
      const data = await res.json();
      return { ip: data.ip || "unknown", city: data.city || "unknown", country: data.country_name || "unknown", org: data.org || "unknown", ua: navigator.userAgent };
    } catch {
      return { ip: "unknown", city: "unknown", country: "unknown", org: "unknown", ua: navigator.userAgent };
    }
  }

  function randomHex(len) {
    return [...Array(len)].map(() => Math.floor(Math.random()*16).toString(16)).join('');
  }

  const threats = ["minimal", "mild", "Kitten-Like", "negligible", "laughable", "existential (just kidding)"];
  const randomThreat = threats[Math.floor(Math.random() * threats.length)];
  const sessionId = randomHex(32);

  const now = new Date();
  const iso = now.toISOString();
  const pad = n => String(n).padStart(2, '0');
  const fileDate = `${now.toLocaleString('en-GB', {month:'short'})} ${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const loginDate = `${now.toLocaleString('en-GB', {weekday:'short'})} ${now.toLocaleString('en-GB', {month:'short'})} ${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())} ${now.getFullYear()}`;

  async function run() {
    if (isBot()) {
      window.location = "/garden.html";
      return;
    }

    const info = await getInfo();

    const lines = [
      `Last login: ${loginDate} from ${info.ip}`,
      `root@calico-sunbeam:~# ls -la /etc/calico/`,
      `total 0`,
      `drwxr-xr-x  2 root root   40 ${fileDate} .`,
      `drwxr-xr-x 12 root root  240 ${fileDate} ..`,
      `-rw-------  1 root root 4096 ${fileDate} secrets.yaml`,
      `root@calico-sunbeam:~# cat /etc/calico/secrets.yaml`,
      `reading file...`,
      `decrypting...`,
      `authorising...`,
      ``,
      `WELCOME TO CALICO SUNBEAM SECURITY SYSTEM`,
      `(c) 2026 Calico Sunbeam. All rights reserved.`,
      ``,
      `⚠  UNAUTHORISED ACCESS DETECTED  ⚠`,
      ``,
      `timestamp:    ${iso}`,
      `session:      ${sessionId}`,
      `origin:       ${info.city}, ${info.country}`,
      `isp:          ${info.org}`,
      `ip:           ${info.ip}`,
      `user agent:   ${info.ua}`,
      `threat level: ${randomThreat}`,
      ``,
      `YOU FOOL YOU HAVE ACTIVATED MY TRAP CARD`,
      `alerting response team...`,
      `ip address:   ${info.ip} logged and reported to the response team.`,
      `response team: One (1) "smol-class" (under 3.5 Kg) Cat (Felis catus domesticus) with sharp teeth notified.`,
      `estimated response time: when she feels like it. (estimated: 3-5 business days depending on her mood and whether she is napping or not)`,
      ``,
      `ooo she got her claws out, she is coming for you... :3`,
      `redirecting to consequences...`,
    ];

    let i = 0, j = 0;
    const el = document.getElementById("terminal");
    const cursor = document.getElementById("cursor");

    function type() {
      if (i < lines.length) {
        if (j < lines[i].length) {
          el.textContent += lines[i][j++];
          setTimeout(type, 18);
        } else {
          el.textContent += "\n";
          i++; j = 0;
          setTimeout(type, 350);
        }
      } else {
        cursor.style.display = "none";
        setTimeout(() => { window.location = "https://www.youtube.com/watch?v=dQw4w9WgXcQ"; }, 1500);
      }
    }

    type();
  }

  run();
</script>
</body>
</html>
